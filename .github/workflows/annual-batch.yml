# Annual data batch — fetches new EDINET filings, parses XBRL, and upserts into Supabase.
#
# Schedule: 6/30 15:00 UTC = 7/1 00:00 JST.
# Manual run is also available via workflow_dispatch.
#
# Required GitHub secrets:
#   EDINET_API_KEY        — EDINET API v2 subscription key
#   DATABASE_URL          — Supabase Postgres connection string (use Pooler URL)
#   SLACK_WEBHOOK_URL     — (optional) Slack incoming webhook for notification
#
name: Annual Data Batch

on:
  schedule:
    # 6/30 15:00 UTC == 7/1 00:00 JST
    - cron: "0 15 30 6 *"
  workflow_dispatch:
    inputs:
      fiscal_year:
        description: "Override target fiscal year (year of period end). Empty = previous calendar year."
        required: false
        default: ""
      dry_run:
        description: "Skip DB writes for testing"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # this can run a few hours for 4,000 companies × XBRL download
    defaults:
      run:
        working-directory: data-pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run annual batch
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONIOENCODING: "utf-8"
        run: |
          set -e
          ARGS=""
          if [ -n "${{ github.event.inputs.fiscal_year }}" ]; then
            ARGS="--fiscal-year ${{ github.event.inputs.fiscal_year }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m src.cli run-batch $ARGS

      - name: Upload processed snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: data-pipeline/data/processed/*.json
          retention-days: 30

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":":rotating_light: Annual batch failed in salary-ranking-jp. See workflow run."}' \
            "$SLACK_WEBHOOK_URL"
